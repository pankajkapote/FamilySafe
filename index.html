<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="KulDhan">
<meta name="theme-color" content="#1D9E75">
<title>KulDhan — Family Vault</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#085041;
  --red:#E24B4A;--red-light:#FCEBEB;--amber:#EF9F27;--amber-light:#FAEEDA;
  --blue:#378ADD;--blue-light:#E6F1FB;
  --bg:#f5f4ef;--white:#ffffff;--border:#e8e8e4;--border2:#e0e0da;
  --text:#1a1a18;--text2:#555;--text3:#888;--text4:#aaa;
  --font:system-ui,-apple-system,sans-serif;
  --r:12px;--r2:10px;--r3:8px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:var(--font);outline:none}
a{color:var(--green);text-decoration:none}

/* ── Layout ── */
#app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;position:relative}
#header{background:var(--white);border-bottom:0.5px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
#header h1{font-size:16px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px}
#header h1 span.logo{font-size:20px}
#header h1 span.tagline{font-size:12px;color:var(--text3);font-weight:400}
#content{flex:1;padding:16px;padding-bottom:80px}
#nav{background:var(--white);border-top:0.5px solid var(--border);padding:8px 0 calc(8px + env(safe-area-inset-bottom));display:flex;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;background:none;border:none;cursor:pointer;color:var(--text3);font-size:10px;font-family:var(--font);transition:color 0.15s}
.nav-btn.active{color:var(--green)}
.nav-btn svg{width:22px;height:22px;stroke-width:1.8}

/* ── Cards ── */
.card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.card-sm{background:var(--white);border:0.5px solid var(--border);border-radius:var(--r2);padding:10px 12px;margin-bottom:8px}
.section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin:18px 0 8px}

/* ── Forms ── */
.inp{width:100%;padding:10px 12px;font-size:14px;border:1px solid var(--border2);border-radius:var(--r3);background:var(--white);color:var(--text);font-family:var(--font);transition:border-color 0.15s}
.inp:focus{border-color:var(--green)}
.lbl{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
.field{margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-primary{width:100%;padding:12px;background:var(--green);color:#fff;border-radius:var(--r2);font-size:14px;font-weight:700;border:none;cursor:pointer;transition:opacity 0.15s}
.btn-primary:active{opacity:0.85}
.btn-secondary{padding:10px 18px;background:none;border:1px solid var(--border2);border-radius:var(--r2);font-size:13px;color:var(--text2);cursor:pointer}
.btn-danger{padding:8px 14px;background:var(--red-light);border:0.5px solid var(--red);border-radius:var(--r3);font-size:12px;color:var(--red);cursor:pointer}

/* ── Pills / badges ── */
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.pill-blue{background:var(--blue-light);color:#0C447C}

.preview-box{width:100%;height:140px;border:1px dashed var(--border2);border-radius:var(--r2);display:flex;align-items:center;justify-content:center;overflow:hidden;background:#fafafa;margin-bottom:12px;position:relative;cursor:pointer}
.preview-box img{width:100%;height:100%;object-fit:contain}

.scope-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border)}
.scope-row input[type="checkbox"]{width:18px;height:18px;accent-color:var(--green)}

#drive-notice{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 16px;border-radius:var(--r2);font-size:12px;z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#drive-notice.show{opacity:1}
</style>
</head>
<body>

<!-- Privacy modal -->
<div id="privacy-modal" style="display:none">
  <div class="box" style="background:#fff; padding:24px; border-radius:20px; max-width:440px; width:90%;">
    <div style="text-align:center;margin-bottom:18px">
      <div style="width:56px;height:56px;background:var(--green);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 12px">🔐</div>
      <div style="font-size:20px;font-weight:800;margin-bottom:4px">Welcome to KulDhan</div>
      <div style="font-size:13px;color:var(--text3)">Your completely local vault application</div>
    </div>
    <button class="btn-primary" onclick="acceptPrivacy()">Get Started →</button>
  </div>
</div>

<div id="drive-notice">Notification space</div>

<!-- Main App Frame -->
<div id="app">
  <div id="header">
    <h1><span class="logo">🔐</span> KulDhan <span class="tagline">— Family Vault</span></h1>
    <div id="header-actions" style="display:flex;align-items:center;gap:8px">
      <button onclick="openImportPopup()" style="background:none;border:0.5px solid var(--border2);border-radius:var(--r3);padding:6px 10px;font-size:12px;color:var(--text2);cursor:pointer">Import</button>
      <button onclick="exportData()" style="background:none;border:0.5px solid var(--border2);border-radius:var(--r3);padding:6px 10px;font-size:12px;color:var(--text2);cursor:pointer">Export</button>
    </div>
  </div>

  <div id="content"></div>

  <nav id="nav">
    <button class="nav-btn active" onclick="showPage('home')" id="nav-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </button>
    <button class="nav-btn" onclick="showPage('members')" id="nav-members">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      Family
    </button>
    <button class="nav-btn" onclick="showPage('health')" id="nav-health">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      Health
    </button>
    <button class="nav-btn" onclick="showPage('finance')" id="nav-finance">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      Finance
    </button>
    <button class="nav-btn" onclick="showPage('docs')" id="nav-docs">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Docs
    </button>
  </nav>
</div>

<!-- Inputs inputs outside DOM stream -->
<input type="file" id="global-file-picker" accept="image/*" style="display:none" onchange="handleFileSelection(event)">
<input type="file" id="import-json-picker" accept=".json,text/plain" style="display:none" onchange="importData(event)">

<div class="overlay" id="sheet-overlay" onclick="closeSheet(event)">
  <div class="sheet" id="sheet-content">
    <div class="sheet-handle"></div>
    <div id="sheet-body"></div>
  </div>
</div>

<script>
const DB_KEY = 'kuldhan_v1';
const PRIVACY_KEY = 'kuldhan_privacy_ok';
const COLORS = ['#1D9E75','#378ADD','#D85A30','#7F77DD','#D4537E','#639922','#EF9F27','#E24B4A'];
const BLOOD_GROUPS = ['A+','A-','B+','B-','O+','O-','AB+','AB-','Unknown'];
const RELATIONS = ['self','spouse','mother','father','son','daughter','brother','sister','grandfather','grandmother','uncle','aunt','other'];

let DB = {};
let currentPage = 'home';
let currentMemberId = null;
let temporaryBase64Image = ""; 

function loadDB() {
  try { DB = JSON.parse(localStorage.getItem(DB_KEY) || '{}'); } catch { DB = {}; }
  if (!DB.members) DB.members = [];
  if (!DB.health) DB.health = {};
  if (!DB.insurance) DB.insurance = [];
  if (!DB.finance) DB.finance = { accounts: [], mf: [], fd: [] };
  if (!DB.docs) DB.docs = [];
  if (!DB.sos) DB.sos = { contacts: [], hospitals: [], ambulance: [] };
}

function saveDB() {
  localStorage.setItem(DB_KEY, JSON.stringify(DB));
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function acceptPrivacy() {
  localStorage.setItem(PRIVACY_KEY, '1');
  document.getElementById('privacy-modal').style.display = 'none';
}

function exportData() {
  const blob = new Blob([JSON.stringify(DB, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'kuldhan-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showDriveToast('Vault file backup package exported!');
}

function openImportPopup() {
  document.getElementById('import-json-picker').click();
}

function showDriveToast(msg) {
  const el = document.getElementById('drive-notice');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      let dataText = ev.target.result;
      if (dataText.startsWith("SECURE-VAULT:")) {
        const pin = prompt("Encrypted backup. Enter security password key code:");
        if (!pin) return;
        dataText = xorCipher(dataText.replace("SECURE-VAULT:", ""), pin);
      }
      const data = JSON.parse(dataText);
      if (data.members) {
        DB = data;
        saveDB();
        showPage(currentPage);
        alert('Vault package processed completely!');
      }
    } catch { alert('Data package structural parsing failure.'); }
  };
  reader.readAsText(file);
}

/* ── Local File Handling Framework ── */
function triggerFilePicker() {
  document.getElementById('global-file-picker').click();
}

function handleFileSelection(e) {
  const file = e.target.files[0];
  if (!file) return;

  showDriveToast("Downscaling thumbnail locally...");
  const reader = new FileReader();
  reader.onload = function(event) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      let width = img.width;
      let height = img.height;
      const max_size = 400; 

      if (width > height) {
        if (width > max_size) { height *= max_size / width; width = max_size; }
      } else {
        if (height > max_size) { width *= max_size / height; height = max_size; }
      }
      canvas.width = width;
      canvas.height = height;
      
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      
      temporaryBase64Image = canvas.toDataURL('image/jpeg', 0.60);
      
      const pContainer = document.getElementById('preview-container');
      if (pContainer) {
        pContainer.innerHTML = `<img src="${temporaryBase64Image}" style="width:100%; height:100%; object-fit:contain;">`;
      }
    };
    img.src = event.target.result;
  };
  reader.readAsDataURL(file);
}

function xorCipher(str, key) {
  let output = '';
  for (let i = 0; i < str.length; i++) {
    output += String.fromCharCode(str.charCodeAt(i) ^ key.charCodeAt(i % key.length));
  }
  return output;
}

/* ── Sheet Display Modals ── */
function openSheet(title, html) {
  document.getElementById('sheet-body').innerHTML = `<div class="sheet-title">${esc(title)}</div>` + html;
  document.getElementById('sheet-overlay').classList.add('open');
}
function closeSheet(e) {
  if (e && e.target !== document.getElementById('sheet-overlay')) return;
  document.getElementById('sheet-overlay').classList.remove('open');
}
function closeSheetDirect() {
  document.getElementById('sheet-overlay').classList.remove('open');
}

/* ── Navigation Hub Router ── */
function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nav-' + page);
  if (nb) nb.classList.add('active');
  
  if (page === 'home') renderHome();
  else if (page === 'members') renderMembers();
  else if (page === 'health') renderHealthHome();
  else if (page === 'finance') renderFinance();
  else if (page === 'docs') renderDocs();
}

/* ══════════════════════════════════════
   HOME RENDER ENGINE
══════════════════════════════════════ */
function renderHome() {
  const members = DB.members.length;
  const docs = DB.docs.length;
  document.getElementById('content').innerHTML = `
    <div style="margin-bottom:18px">
      <div style="font-size:22px;font-weight:800;letter-spacing:-0.5px">Good day 👋</div>
      <div style="font-size:13px;color:var(--text3);margin-top:3px">KulDhan Vault Dashboard · Stored locally on device</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      <div onclick="showPage('members')" style="background:#fff; border:0.5px solid var(--border); border-radius:var(--r); padding:14px; cursor:pointer">
        <div style="font-size:22px;margin-bottom:8px">👨‍👩‍👧‍👦</div>
        <div style="font-size:22px;font-weight:800;color:var(--blue);">${members}</div>
        <div style="font-size:12px;color:var(--text3);">Family members</div>
      </div>
      <div onclick="showPage('docs')" style="background:#fff; border:0.5px solid var(--border); border-radius:var(--r); padding:14px; cursor:pointer">
        <div style="font-size:22px;margin-bottom:8px">📂</div>
        <div style="font-size:22px;font-weight:800;color:var(--amber);">${docs}</div>
        <div style="font-size:12px;color:var(--text3);">Documents Vault</div>
      </div>
    </div>
    <div class="section-title">Transfer Options</div>
    <div onclick="openShareSheet()" style="background:#white; border:0.5px solid var(--border); border-radius:var(--r2); padding:12px; cursor:pointer; display:flex; align-items:center; gap:8px">
      <span style="font-size:18px">📤</span><span style="font-size:12px">Granular Custom Sharing</span>
    </div>
  `;
}

/* ══════════════════════════════════════
   FAMILY MANAGEMENT CORE
══════════════════════════════════════ */
function renderMembers() {
  const members = DB.members;
  document.getElementById('content').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div>
        <div style="font-size:18px;font-weight:700">Family Members</div>
        <div style="font-size:12px;color:var(--text3)">${members.length} member(s)</div>
      </div>
      <button onclick="showAddMemberSheet()" style="padding:8px 14px;background:var(--green);color:#fff;border-radius:var(--r2);font-size:13px;font-weight:600;border:none;cursor:pointer">+ Add</button>
    </div>
    ${members.length === 0 ? '<div class="empty"><p>No member context layers created yet.</p></div>' : ''}
    ${members.map(m => `
      <div class="card" onclick="showMemberDetail('${m.id}')" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer">
        <div style="display:flex; align-items:center; gap:12px;">
          <div class="avatar" style="background:${m.color||'var(--green)'}">${(m.name||'M')[0]}</div>
          <div>
            <div style="font-size:14px;font-weight:600">${esc(m.name)}</div>
            <div style="font-size:12px;color:var(--text3)">${esc(m.relation||'')} · <span style="color:var(--red); font-weight:600">${esc(m.blood_group||'Unknown')}</span></div>
          </div>
        </div>
        <button onclick="event.stopPropagation(); showAddMemberSheet('${m.id}')" style="background:none; color:var(--blue); font-size:12px; font-weight:600;">✏️ Edit</button>
      </div>`).join('')}
  `;
}

function showAddMemberSheet(editId) {
  const m = editId ? DB.members.find(x=>x.id===editId) : null;
  const v = m || {};
  openSheet(editId ? 'Modify Member Profile' : 'Add Family Profile', `
    <div class="field"><label class="lbl">Full Name *</label><input class="inp" id="m-name" value="${esc(v.name||'')}"></div>
    <div class="grid2">
      <div class="field"><label class="lbl">Relation</label>
        <select class="inp" id="m-rel">${RELATIONS.map(r=>`<option value="${r}" ${v.relation===r?'selected':''}>${r}</option>`).join('')}</select>
      </div>
      <div class="field"><label class="lbl">Blood Type</label>
        <select class="inp" id="m-bg">${BLOOD_GROUPS.map(b=>`<option value="${b}" ${v.blood_group===b?'selected':''}>${b}</option>`).join('')}</select>
      </div>
    </div>
    <input type="hidden" id="m-color" value="${esc(v.color||COLORS[0])}">
    <input type="hidden" id="m-editid" value="${editId||''}">
    <button class="btn-primary" onclick="saveMember()" style="margin-top:8px;">Save Profile Context</button>
  `);
}

function saveMember() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { alert('Name field required.'); return; }
  const editId = document.getElementById('m-editid').value;
  const memberObj = {
    id: editId || uid(),
    name,
    relation: document.getElementById('m-rel').value,
    blood_group: document.getElementById('m-bg').value,
    color: document.getElementById('m-color').value || COLORS[0]
  };

  if (editId) {
    const idx = DB.members.findIndex(x=>x.id===editId);
    if(idx>=0) DB.members[idx] = memberObj;
  } else {
    DB.members.push(memberObj);
  }
  saveDB();
  closeSheetDirect();
  renderMembers();
}

function showMemberDetail(id) {
  const m = DB.members.find(x=>x.id===id);
  if (!m) return;
  openSheet(m.name, `
    <div style="font-size:14px;margin-bottom:8px">Relation Context: <strong>${esc(m.relation)}</strong></div>
    <div style="font-size:14px;margin-bottom:8px">Blood Type: <strong>${esc(m.blood_group)}</strong></div>
    <button class="btn-secondary" onclick="showAddMemberSheet('${m.id}')" style="margin-top:8px;">Edit Info Tag</button>
  `);
}

function renderHealthHome() { document.getElementById('content').innerHTML = `<div class="card"><h3>Health Metrics Module</h3><p>Medical structural layers execute accurately inside specific family object cards updates safely.</p></div>`; }
function renderFinance() { document.getElementById('content').innerHTML = `<div class="card"><h3>Finance & Policies Space</h3><p>Granular structural records parameters configurations stay here.</p></div>`; }

/* ══════════════════════════════════════
   DOCUMENTS VAULT SYSTEM
══════════════════════════════════════ */
function renderDocs() {
  const docs = DB.docs || [];
  document.getElementById('content').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div>
        <div style="font-size:18px;font-weight:700">Documents Vault</div>
        <div style="font-size:12px;color:var(--text3)">${docs.length} saved tracking file records</div>
      </div>
      <button onclick="showAddDocSheet()" style="padding:8px 14px;background:var(--green);color:#fff;border-radius:var(--r2);font-size:13px;font-weight:600;border:none;cursor:pointer">+ Add Doc</button>
    </div>
    ${docs.length===0?'<div class="empty"><p>No document structures found inside local storage vault framework.</p></div>':''}
    ${docs.map((d,i)=>renderDocCard(d,i)).join('')}
  `;
}

function renderDocCard(d, i) {
  return `
    <div class="card" style="border-left:4px solid var(--green); position:relative;">
      <div style="display:flex; justify-content:space-between; align-items:flex-start;">
        <div>
          <div style="font-size:14px;font-weight:700;">${esc(d.name)} <span class="pill pill-blue" style="font-size:10px; padding:2px 6px;">${esc(d.category)}</span></div>
          <div style="font-size:12px;color:var(--text3);margin-top:3px;">Assigned to: ${esc(d.member || 'All')}</div>
        </div>
        <div style="display:flex; gap:10px;">
          <button onclick="showAddDocSheet('${d.id}')" style="background:none; color:var(--blue); font-size:12px; font-weight:600; cursor:pointer;">✏️ Edit</button>
          <button onclick="deleteDoc(${i})" style="background:none; color:var(--text4); font-size:16px; cursor:pointer;">×</button>
        </div>
      </div>
      
      ${d.drive_link ? `<div style="margin-top:6px; font-size:11px;"><a href="${esc(d.drive_link)}" target="_blank" style="color:var(--blue); text-decoration:underline;">☁️ View Full Cloud File Source</a></div>` : ''}
      
      ${d.local_img ? `
        <div style="margin-top:10px; text-align:center; background:#fafafa; padding:8px; border-radius:var(--r3); border:0.5px solid var(--border2)">
          <img src="${d.local_img}" style="max-width:100%; max-height:120px; object-fit:contain; border-radius:4px;">
        </div>
      ` : ''}
    </div>
  `;
}

function showAddDocSheet(editId) {
  const d = editId ? DB.docs.find(x=>x.id===editId) : null;
  const v = d || {};
  temporaryBase64Image = v.local_img || "";

  openSheet(editId ? 'Modify Document Information' : 'Attach Document Frame', `
    <div class="field">
      <label class="lbl">Camera Snapshot / Local Attachment File Preview</label>
      <div class="preview-box" id="preview-container" onclick="triggerFilePicker()">
        ${temporaryBase64Image ? `<img src="${temporaryBase64Image}">` : `<span style="color:var(--text3);font-size:12px;">📸 Tap to snap photo or select image asset file</span>`}
      </div>
    </div>

    <div class="field">
      <label class="lbl">Google Drive / Secure Cloud High-Res Link</label>
      <input class="inp" id="d-link" value="${esc(v.drive_link||'')}" placeholder="Paste file reference tracking URL link here">
    </div>

    <div class="field"><label class="lbl">Document Name Tag Tag *</label><input class="inp" id="d0" value="${esc(v.name||'')}" placeholder="e.g. Health Plan Card / Identity Card"></div>
    <div class="grid2">
      <div class="field"><label class="lbl">Category</label>
        <select class="inp" id="d1">
          <option value="identity" ${v.category==='identity'?'selected':''}>Identity</option>
          <option value="insurance" ${v.category==='insurance'?'selected':''}>Insurance</option>
          <option value="finance" ${v.category==='finance'?'selected':''}>Finance</option>
          <option value="medical" ${v.category==='medical'?'selected':''}>Medical</option>
          <option value="other" ${v.category==='other'?'selected':''}>Other</option>
        </select>
      </div>
      <div class="field"><label class="lbl">Family Allocation</label>
        <select class="inp" id="d2">
          <option value="">All Contexts</option>
          ${DB.members.map(m=>`<option value="${esc(m.name)}" ${v.member===m.name?'selected':''}>${esc(m.name)}</option>`).join('')}
        </select>
      </div>
    </div>

    <input type="hidden" id="d-editid" value="${editId||''}">
    <button class="btn-primary" onclick="saveDoc()" style="margin-top:10px;">Save Changes Matrix</button>
  `);
}

function saveDoc() {
  const g = id => (document.getElementById(id)||{}).value || '';
  if (!g('d0')) { alert('Title naming field required.'); return; }
  
  const editId = document.getElementById('d-editid').value;
  const docObj = {
    id: editId || uid(),
    name: g('d0'),
    category: g('d1'),
    member: g('d2'),
    drive_link: g('d-link'),
    local_img: temporaryBase64Image
  };

  if (editId) {
    const idx = DB.docs.findIndex(x=>x.id===editId);
    if(idx>=0) DB.docs[idx] = docObj;
  } else {
    DB.docs.push(docObj);
  }

  saveDB();
  closeSheetDirect();
  renderDocs();
}

function deleteDoc(i) {
  if(!confirm('Delete selected asset reference completely?')) return;
  DB.docs.splice(i,1);
  saveDB();
  renderDocs();
}

/* ══════════════════════════════════════
   GRANULAR DATA EXPORT SCREEN
══════════════════════════════════════ */
function openShareSheet() {
  openSheet('Granular Data Share Options', `
    <div class="notice notice-amber" style="font-size:12px;">Toggle checkbox options explicitly to package target vault configurations safely.</div>
    <div class="scope-row"><input type="checkbox" id="sc-members" checked><label for="sc-members">Profile Profiles Parameters</label></div>
    <div class="scope-row"><input type="checkbox" id="sc-docs" checked><label for="sc-docs">Documents Reference Objects & Images</label></div>
    <div style="margin-top:18px;"><button class="btn-primary" onclick="processGranularPackage()">Compile Sealed Export Package</button></div>
  `);
}

function processGranularPackage() {
  const exportScope = {};
  if (document.getElementById('sc-members').checked) exportScope.members = DB.members;
  if (document.getElementById('sc-docs').checked) exportScope.docs = DB.docs;
  exportScope.sos = DB.sos;

  const pin = prompt("Create a simple 4-digit verification secure password key code to seal this data:");
  if (!pin || pin.length < 4) {
    alert("Invalid entry key requirements.");
    return;
  }

  const outputString = "SECURE-VAULT:" + xorCipher(JSON.stringify(exportScope), pin);
  const blob = new Blob([outputString], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'kuldhan-vault-package-' + new Date().toISOString().slice(0,10) + '.txt';
  a.click();
  URL.revokeObjectURL(url);
  closeSheetDirect();
  showDriveToast("Encrypted file compiled successfully!");
}

/* ══════════════════════════════════════
   INITIALIZATION ROUTINE RUNNERS
══════════════════════════════════════ */
loadDB();
if (!localStorage.getItem(PRIVACY_KEY)) {
  document.getElementById('privacy-modal').style.display = 'flex';
}
showPage('home');
</script>
